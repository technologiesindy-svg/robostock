<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  body{font-family:sans-serif;max-width:500px;margin:60px auto;padding:20px;background:#111;color:#eee}
  input{width:100%;padding:10px;margin:8px 0;background:#222;border:1px solid #444;color:#eee;border-radius:6px;box-sizing:border-box}
  button{width:100%;padding:10px;margin:8px 0;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px}
  button:hover{background:#6d28d9}
  #status{padding:12px;border-radius:6px;margin:10px 0;text-align:center}
  .ok{background:#14532d;color:#86efac}
  .err{background:#7f1d1d;color:#fca5a5}
  #msg-box{margin-top:20px}
  .msg{background:#1e1b4b;padding:10px;border-radius:6px;margin:6px 0;font-size:13px}
  textarea{width:100%;padding:10px;background:#222;border:1px solid #444;color:#eee;border-radius:6px;box-sizing:border-box;resize:none}
  hr{border-color:#333;margin:20px 0}
</style>
</head>
<body>

<h2>🔥 Firebase Test</h2>

<!-- STEP 1: LOGIN -->
<div id="login-section">
  <h3>Step 1 — Login</h3>
  <input id="email" type="email" placeholder="Email" value="technologies.indy@gmail.com">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="doLogin()">🔐 Login</button>
  <div id="status"></div>
</div>

<!-- STEP 2: FIRESTORE TEST -->
<div id="db-section" style="display:none">
  <h3>Step 2 — Firestore Test</h3>
  <p id="user-info" style="color:#a78bfa"></p>

  <textarea id="msg-input" rows="2" placeholder="พิมพ์ข้อความแล้วกด Send..."></textarea>
  <button onclick="sendMsg()">📤 Send to Firestore</button>

  <hr>
  <b>📥 ข้อความ Realtime จาก Firestore:</b>
  <div id="msg-box"><i style="color:#666">รอข้อมูล...</i></div>

  <hr>
  <button onclick="doLogout()" style="background:#991b1b">🚪 Logout</button>
</div>

<script>
// ใช้ config เดิมของ robostock-center
firebase.initializeApp({
  apiKey: "AIzaSyA3dmLOMg6FdTBsK77w--_SPfWzvtUBZpA",
  authDomain: "robostock-center.firebaseapp.com",
  projectId: "robostock-center",
  storageBucket: "robostock-center.firebasestorage.app",
  messagingSenderId: "998849568362",
  appId: "1:998849568362:web:dfa9901085f6c9b6cff413"
});
const auth = firebase.auth();
const db = firebase.firestore();
let unsub = null;

// AUTH STATE
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('login-section').style.display='none';
    document.getElementById('db-section').style.display='block';
    document.getElementById('user-info').textContent='✅ Login สำเร็จ: '+user.email;
    setStatus('✅ Login สำเร็จ: '+user.email, 'ok');
    startListening();
  } else {
    document.getElementById('login-section').style.display='block';
    document.getElementById('db-section').style.display='none';
    if(unsub){ unsub(); unsub=null; }
  }
});

function setStatus(msg, type){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

async function doLogin(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  setStatus('⏳ กำลัง Login...', '');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    setStatus('❌ '+e.message, 'err');
  }
}

function doLogout(){ auth.signOut(); }

async function sendMsg(){
  const text = document.getElementById('msg-input').value.trim();
  if(!text) return;
  try {
    await db.collection('test_messages').add({
      text,
      user: auth.currentUser?.email,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('msg-input').value = '';
    setStatus('✅ บันทึกสำเร็จ!', 'ok');
  } catch(e) {
    setStatus('❌ Firestore Error: '+e.message, 'err');
  }
}

function startListening(){
  unsub = db.collection('test_messages')
    .orderBy('time','desc').limit(10)
    .onSnapshot(snap => {
      const box = document.getElementById('msg-box');
      if(snap.empty){ box.innerHTML='<i style="color:#666">ยังไม่มีข้อความ</i>'; return; }
      box.innerHTML = snap.docs.map(d => {
        const r = d.data();
        const t = r.time?.toDate().toLocaleTimeString('th-TH') || '...';
        return `<div class="msg">💬 ${r.text} <span style="color:#666;font-size:11px">— ${r.user} · ${t}</span></div>`;
      }).join('');
    }, err => {
      setStatus('❌ Firestore Error: '+err.message, 'err');
    });
}
</script>
</body>
</html>
